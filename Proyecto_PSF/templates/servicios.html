<h1>Servicios</h1>

<form action="/agregar" method="POST">

<input type="text" name="nombre" placeholder="Nombre del servicio" required>

<input type="text" name="descripcion" placeholder="Descripción" required>

<button type="submit">Agregar servicio</button>

</form>

<br>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Descripción</th>
<th>Acciones</th>
</tr>

{% for s in servicios %}

<tr>

<td>{{ s.id }}</td>

<td>{{ s.nombre }}</td>

<td>{{ s.descripcion }}</td>

<td>

<a href="/servicio/{{ s.id }}">Ver</a>

|

<a href="/editar/{{ s.id }}">Editar</a>

|

<a href="/eliminar/{{ s.id }}">Eliminar</a>

</td>

</tr>

{% endfor %}

</table>
